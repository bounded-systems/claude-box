name: CI

# Gate the repo on `bun test` + `tsc --noEmit`. Both run here (not as hermetic
# nix flake checks) because `bun x tsc` fetches typescript + bun-types from npm,
# which the nix build sandbox blocks — CI has the network it needs. Runs on every
# PR and on pushes to main, so main can't silently go red.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: bun test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pin for reproducibility; bump as the project's Bun moves.
          bun-version: 1.3.11
      # No `bun install` — the repo has no package.json/deps; tests import
      # bun:test, node: builtins, and local .ts only.
      - name: Run tests
        run: bun test

  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      # `bun x tsc` fetches typescript + bun-types from npm (network available
      # here, unlike the nix sandbox). tsconfig sets types: ["bun-types"].
      - name: Type check
        run: bun x tsc --noEmit
