name: CI

# Gate the repo on `bun test` + `tsc --noEmit`. Runs on every PR and on pushes to
# main, so main can't silently go red. (tsc runs here, not as a hermetic nix
# check: tsconfig needs `bun-types` from npm, which the nix sandbox can't fetch.)
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: bun test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Pin for reproducibility; bump as the project's Bun moves.
          bun-version: 1.3.11
      # No `bun install` — the repo has no package.json/deps; tests import
      # bun:test, node: builtins, and local .ts only.
      - name: Run tests
        run: bun test

  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      # tsconfig sets types: ["bun-types"]; the repo has no package.json, so
      # install the ambient types ephemerally (not committed) before checking.
      - name: Install bun ambient types
        run: bun add --dev bun-types
      - name: Type check
        run: bun x tsc --noEmit
