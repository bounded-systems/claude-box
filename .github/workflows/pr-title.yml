name: pr-title

# The repo squash-merges, so a PR's title becomes its commit subject on main —
# which is what release-please parses to decide the next version. Enforce that
# titles follow Conventional Commits (see CONTRIBUTING.md).
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
