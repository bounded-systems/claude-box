name: publish-ghcr

# Build the pinned OCI images with nix and push them to GHCR. Fires on the
# `v*` tags created by the release workflow; `workflow_dispatch` allows a manual
# build (defaults to the `dev` tag) for testing.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (manual runs)"
        default: "dev"

permissions:
  contents: read
  packages: write

env:
  # ghcr.io/<owner>/claude-box/<image>
  REGISTRY: ghcr.io/${{ github.repository_owner }}/claude-box

jobs:
  # Build each image natively on its own arch, push an arch-suffixed tag.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, system: x86_64-linux, runner: ubuntu-latest }
          - { arch: arm64, system: aarch64-linux, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-experimental-features = nix-command flakes

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | nix run nixpkgs#skopeo -- login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build + push images (${{ matrix.arch }})
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # nix attr  ->  GHCR image name
          declare -A images=(
            [claude-image]=claude-personal
            [keeperd-image]=keeperd
            [netd-image]=netd
            [scoutd-image]=scoutd
          )
          for attr in "${!images[@]}"; do
            name="${images[$attr]}"
            echo "::group::build $attr ($name) for ${{ matrix.system }}"
            # The flake instantiates nixpkgs with allowUnfree, so no --impure needed.
            nix build ".#packages.${{ matrix.system }}.${attr}"
            archive="$(readlink -f result)"
            nix run nixpkgs#skopeo -- copy --insecure-policy \
              "docker-archive:${archive}" \
              "docker://${REGISTRY}/${name}:${VERSION}-${{ matrix.arch }}"
            echo "::endgroup::"
          done

  # Combine the per-arch tags into one multi-arch manifest per image.
  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create + push manifest lists
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          for name in claude-personal keeperd netd scoutd; do
            ref="${REGISTRY}/${name}"
            docker manifest create "${ref}:${VERSION}" \
              "${ref}:${VERSION}-amd64" "${ref}:${VERSION}-arm64"
            docker manifest push "${ref}:${VERSION}"
            # Tagged releases also move `latest`.
            if [ "${{ github.event_name }}" = "push" ]; then
              docker manifest create "${ref}:latest" \
                "${ref}:${VERSION}-amd64" "${ref}:${VERSION}-arm64"
              docker manifest push "${ref}:latest"
            fi
          done
