name: publish-ghcr

# Build the pinned OCI images with nix and push them to GHCR. Called by the
# release workflow when release-please cuts a release (`workflow_call`), or run
# manually for a throwaway build (`workflow_dispatch`, defaults to the `dev` tag).
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to publish"
        default: "dev"
        type: string

permissions:
  contents: read
  packages: write

env:
  # ghcr.io/<owner>/claude-box/<image>
  REGISTRY: ghcr.io/${{ github.repository_owner }}/claude-box
  VERSION: ${{ inputs.version }}

jobs:
  # Build each image natively on its own arch, push an arch-suffixed tag.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, system: x86_64-linux, runner: ubuntu-latest }
          - { arch: arm64, system: aarch64-linux, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main — bump deliberately
        with:
          extra-conf: |
            extra-experimental-features = nix-command flakes

      # The runner ships a v1 /etc/containers/registries.conf, which the
      # nix-built skopeo (v2-only) refuses to load ("must be in v2 format").
      # Point skopeo at our own empty file — empty parses as valid v2 — so it
      # uses registry defaults instead of the stock v1 config.
      - name: Use a v2 containers registries.conf
        run: |
          : > "${RUNNER_TEMP}/registries.conf"
          echo "CONTAINERS_REGISTRIES_CONF=${RUNNER_TEMP}/registries.conf" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | nix run nixpkgs#skopeo -- login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build + push images (${{ matrix.arch }})
        run: |
          set -euo pipefail
          # nix attr  ->  GHCR image name (box = room, daemons = doors)
          declare -A images=(
            [claude-image]=claude-room
            [keeperd-image]=door-keeper
            [netd-image]=door-net
            [scoutd-image]=door-scout
            [concierged-image]=door-concierge
          )
          for attr in "${!images[@]}"; do
            name="${images[$attr]}"
            echo "::group::build $attr ($name) for ${{ matrix.system }}"
            # The flake instantiates nixpkgs with allowUnfree, so no --impure needed.
            nix build ".#packages.${{ matrix.system }}.${attr}"
            archive="$(readlink -f result)"
            nix run nixpkgs#skopeo -- copy --insecure-policy \
              "docker-archive:${archive}" \
              "docker://${REGISTRY}/${name}:${VERSION}-${{ matrix.arch }}"
            echo "::endgroup::"
          done

  # Combine the per-arch tags into one multi-arch manifest per image.
  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create + push manifest lists
        run: |
          set -euo pipefail
          # GHCR's token endpoint occasionally times out mid-run; retry transient
          # failures with backoff so an unattended release doesn't fail on a blip.
          retry() {
            local n=1
            until "$@"; do
              if [ "$n" -ge 4 ]; then echo "failed after $n attempts: $*" >&2; return 1; fi
              echo "attempt $n failed, retrying: $*" >&2; sleep "$((2 ** n))"; n="$((n + 1))"
            done
          }
          push_list() {  # $1 = manifest list tag to assemble from the two arch tags
            local tag="$1" ref="$2"
            docker manifest rm "$tag" >/dev/null 2>&1 || true  # clear partial local state on retry
            retry docker manifest create "$tag" "${ref}:${VERSION}-amd64" "${ref}:${VERSION}-arm64"
            retry docker manifest push "$tag"
          }
          for name in claude-room door-keeper door-net door-scout door-concierge; do
            ref="${REGISTRY}/${name}"
            push_list "${ref}:${VERSION}" "${ref}"
            # A real release (not a throwaway `dev` build) also moves `latest`.
            if [ "${VERSION}" != "dev" ]; then
              push_list "${ref}:latest" "${ref}"
            fi
          done
