name: release

# release-please drives the version gate (language-agnostic, no package.json):
# conventional-commit pushes to main accumulate into a "release-please" PR that
# bumps version.txt + CHANGELOG.md and, when merged, creates a v<version> tag +
# GitHub Release. Publishing the images is gated on that release in the SAME run
# (release_created) rather than on the tag push — a tag pushed by GITHUB_TOKEN
# does not trigger a separate `on: push: tags` workflow.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Manifest mode: the gate is the top-level `releases_created` (plural);
      # the version is path-prefixed by the package root (".").
      releases_created: ${{ steps.rp.outputs.releases_created }}
      version: ${{ steps.rp.outputs['.--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build + push the images only when a release was just cut.
  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-ghcr.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
    secrets: inherit
