name: release

# release-please drives the version gate (language-agnostic, no package.json):
# conventional-commit pushes to main accumulate into a "release-please" PR that
# bumps version.txt + CHANGELOG.md and, when merged, creates a v<version> tag +
# GitHub Release. Publishing the images is gated on that release in the SAME run
# (release_created) rather than on the tag push — a tag pushed by GITHUB_TOKEN
# does not trigger a separate `on: push: tags` workflow.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # `releases_created` (plural, top-level) is the gate. For the version we
      # read version.txt rather than release-please's per-package output: the
      # manifest-mode output key (`.--version`) came back empty and pushed a
      # bogus `:-amd64` tag, whereas version.txt is what the release just set.
      releases_created: ${{ steps.rp.outputs.releases_created }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # Read version.txt from the latest default-branch tip, NOT the commit that
      # triggered this run. release-please cuts the release against latest main,
      # so when an unrelated push (e.g. a ci: commit) races ahead, the trigger
      # commit can predate the version bump and `cat version.txt` would read a
      # stale version (this shipped a 0.3.0 release that re-published 0.2.0).
      # Checking out the default branch pins us to the version the release set.
      # (release-please's manifest-mode per-package outputs evaluate empty here,
      # so we can't read the version from them.)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: ${{ steps.rp.outputs.releases_created == 'true' }}
        with:
          ref: ${{ github.event.repository.default_branch }}
      - id: ver
        if: ${{ steps.rp.outputs.releases_created == 'true' }}
        run: echo "version=$(cat version.txt)" >> "$GITHUB_OUTPUT"

  # Build + push the images only when a release was just cut.
  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-ghcr.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
    secrets: inherit
