# sni-gw.conf — transparent SNI-passthrough allowlist egress (see
# ADR-RC-EGRESS-SNI). nginx `ssl_preread` reads the ClientHello SNI WITHOUT
# terminating TLS, allowlist-maps it, and blind-passes the encrypted bytes to
# the real host. No MITM, no cleartext — the same no-cleartext guarantee as
# netd's CONNECT tunnel, but without requiring the client to CONNECT (which is
# what lets RC's forward-proxy bridge registration work). A non-allowlisted SNI
# maps to an empty upstream and the connection is refused.
events {}
stream {
  resolver 1.1.1.1 8.8.8.8 valid=30s;
  map $ssl_preread_server_name $upstream {
    ~^([a-z0-9-]+\.)?anthropic\.com$   $ssl_preread_server_name:443;
    claude.ai                          claude.ai:443;
    ~^([a-z0-9-]+\.)?claude\.com$      $ssl_preread_server_name:443;
    default                            "";
  }
  log_format sni '[sni-gw] SNI="$ssl_preread_server_name" -> upstream="$upstream"';
  server {
    listen 443;
    ssl_preread on;
    proxy_pass $upstream;
    proxy_connect_timeout 5s;
    proxy_timeout 330s;
    access_log /dev/stdout sni;
  }
}
